# ===== Configuraciˇn de la aplicaciˇn =====
spring.application.name=eatsmart-backend
server.port=8080

# ===== DATASOURCE (variables de entorno) =====
spring.datasource.url=jdbc:oracle:thin:@${DB_HOST:localhost}:${DB_PORT:1521}:xe
spring.datasource.username=${DB_USERNAME:c##eatsmart_app}
spring.datasource.password=${DB_PASSWORD:Eatsmart_Secure_2026!}
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ===== JPA/HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_size=10

# ===== LOGGING =====
logging.level.root=INFO
logging.level.com.eatsmart=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=INFO

# ===== JWT =====
jwt.secret=eatsmart_secret_key_2026_super_segura_cambiar_en_produccion_para_mayor_seguridad
jwt.expiration=86400000