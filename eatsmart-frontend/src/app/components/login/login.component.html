<div class="login-container">
  <mat-card>
    <div class="logo-container">
      <img src="/logoEatSmart.png" alt="EatSmart Logo" class="logo">
    </div>

    <mat-card-header>
      <mat-card-title>{{ t('login') }}</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>{{ t('email') }}</mat-label>
          <input matInput formControlName="email" type="email" required>
          <mat-error *ngIf="f['email'].invalid">
            <span *ngIf="f['email'].errors?.['required']">{{ t('email') }} es requerido</span>
            <span *ngIf="f['email'].errors?.['email']">Email inválido</span>
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>{{ t('password') }}</mat-label>
          <input matInput formControlName="password" type="password" required>
          <mat-error *ngIf="f['password'].invalid">
            <span *ngIf="f['password'].errors?.['required']">{{ t('password') }} es requerido</span>
            <span *ngIf="f['password'].errors?.['minlength']">Min 6 caracteres</span>
          </mat-error>
        </mat-form-field>

        <div *ngIf="error" class="error-message">{{ error }}</div>

        <button mat-raised-button color="primary" class="full-width" [disabled]="loading">
          {{ loading ? t('loggingIn') : t('login') }}
        </button>
      </form>

      <p class="register-link">
        {{ t('dontHaveAccount') }} <a routerLink="/register">{{ t('registerHere') }}</a>
      </p>
    </mat-card-content>
  </mat-card>
</div>
